services:
  postgres:
    image: postgres:16
    mem_limit: 768m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.7.1
    mem_limit: 1g
    ports:
      - "29092:29092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    image: loadup/order-service:local
    mem_limit: 640m
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=25.0
      ORDER_TENANT_A_JDBC_URL: jdbc:postgresql://postgres:5432/tenant_a_db
      ORDER_TENANT_B_JDBC_URL: jdbc:postgresql://postgres:5432/tenant_b_db
      ORDER_TENANT_DB_USERNAME: order_app
      ORDER_TENANT_DB_PASSWORD: order_app
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OUTBOX_PUBLISH_DELAY_MS: "500"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: loadup/notification-service:local
    mem_limit: 640m
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=25.0
      NOTIFICATION_TENANT_A_JDBC_URL: jdbc:postgresql://postgres:5432/tenant_a_db
      NOTIFICATION_TENANT_B_JDBC_URL: jdbc:postgresql://postgres:5432/tenant_b_db
      NOTIFICATION_TENANT_DB_USERNAME: notification_app
      NOTIFICATION_TENANT_DB_PASSWORD: notification_app
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
